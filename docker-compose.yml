services:
  postgres:
    image: postgres:16-alpine
    container_name: omne-showcase-postgres
    environment:
      POSTGRES_DB: omne_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omne_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 20

  flyway:
    image: flyway/flyway:11-alpine
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -url=jdbc:postgresql://postgres:5432/omne_dashboard
      - -user=postgres
      - -password=postgres
      - -connectRetries=60
      - migrate
    volumes:
      - ./BE/API/flyway/sql:/flyway/sql
    profiles:
      - tools

volumes:
  postgres_data:
